name: YouTube Daily Render & Upload

on:
  # Daily cron paused 2026-05-17 while character video format is being implemented.
  # Re-enable by uncommenting the schedule block below once character system MVP is ready.
  # schedule:
  #   # 14:00 UTC = 23:00 JST every day
  #   - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      max:
        description: 'Max videos to render+upload this run'
        default: '5'
        required: false
      privacy:
        description: 'Video privacy: public | unlisted | private'
        default: 'public'
        required: false

permissions:
  contents: write  # required to git push MP4s and tracker back

jobs:
  render-and-upload:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    concurrency:
      group: youtube-upload
      cancel-in-progress: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Chromium system dependencies for Remotion
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libasound2 \
            libxrandr2 libxkbcommon0 libxfixes3 libxcomposite1 \
            libxdamage1 libgbm1 libatk-bridge2.0-0 \
            libpango-1.0-0 libcairo2 libcups2 libdrm2

      - name: Install npm dependencies
        run: npm ci

      - name: Create .env.local from secrets
        run: |
          cat > .env.local <<EOF
          YOUTUBE_CLIENT_ID=${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET=${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN=${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          EOF

      - name: Render new tools (idempotent, skips already-rendered)
        working-directory: apps/video-factory
        run: npm run render:all -- --max=${{ github.event.inputs.max || '5' }}

      - name: Upload to YouTube (idempotent, skips already-uploaded)
        working-directory: apps/video-factory
        run: npm run upload:all -- --max=${{ github.event.inputs.max || '5' }} --privacy=${{ github.event.inputs.privacy || 'public' }}

      - name: Commit MP4s and tracker back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/video-factory/output/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(yt): daily render+upload batch [skip ci]"
            git push
          fi

      - name: Cleanup .env.local
        if: always()
        run: rm -f .env.local
